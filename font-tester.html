<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="color-scheme" content="light only">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dore Typeface | Nisa Alkan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css?v=1773999888">
    <style>
        @font-face { font-family: 'Dore'; src: url('./fonts/Dore-Thin.otf') format('opentype'); font-weight: 100; }
        @font-face { font-family: 'Dore'; src: url('./fonts/Dore-Light.otf') format('opentype'); font-weight: 300; }
        @font-face { font-family: 'Dore'; src: url('./fonts/Dore-Regular.otf') format('opentype'); font-weight: 400; }
        @font-face { font-family: 'Dore'; src: url('./fonts/Dore-Bold.otf') format('opentype'); font-weight: 700; }
        @font-face { font-family: 'Dore'; src: url('./fonts/Dore-Black.otf') format('opentype'); font-weight: 900; }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: #f8f8f8 !important;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            padding-top: var(--nav-height, 80px);
            overflow-y: scroll;
            scrollbar-gutter: stable;
        }

        header {
            padding: 0 4vw;
            height: 48px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative;
        }

        header::after {
            content: '';
            position: absolute;
            bottom: -1px;
            left: 4vw;
            right: 4vw;
            height: 1px;
            background: rgba(0,0,0,0.1);
        }

        .header-title {
            font-size: 11px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #999;
        }

        .header-meta {
            font-size: 11px;
            letter-spacing: 0.1em;
            color: #bbb;
        }

        .canvas {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 60px 40px;
            cursor: text;
        }

        #preview-text {
            font-family: 'Dore', serif;
            font-size: 96px;
            font-weight: 400;
            line-height: 1.05;
            color: #212121;
            background: transparent;
            border: none;
            outline: none;
            width: 100%;
            text-align: center;
            resize: none;
            overflow: hidden;
            min-height: 120px;
            caret-color: #212121;
            animation: blink-caret 1.4s ease-in-out infinite;
        }

        @keyframes blink-caret {
            0%, 100% { caret-color: #212121; }
            50% { caret-color: transparent; }
        }

        #preview-text::placeholder {
            color: rgba(33,33,33,0.15);
        }

        footer {
            border-top: 1px solid rgba(0,0,0,0.07);
            padding: 0 40px;
            height: 64px;
            display: flex;
            align-items: center;
            gap: 0;
        }

        .control {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 0 18px;
            height: 100%;
            border-right: 1px solid rgba(0,0,0,0.07);
            flex-shrink: 0;
        }

        .control:last-child {
            border-right: none;
            padding-right: 0;
        }

        .control:first-child {
            padding-left: 0;
        }

        .ctrl-label {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #bbb;
            white-space: nowrap;
        }

        .ctrl-value {
            font-size: 12px;
            color: #212121;
            min-width: 36px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100px;
            height: 1px;
            background: #d0d0d0;
            outline: none;
            cursor: pointer;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #212121;
            cursor: pointer;
            transition: transform 0.15s;
        }

        input[type="range"]::-webkit-slider-thumb:hover {
            transform: scale(1.3);
        }

        .weight-pills {
            display: flex;
            gap: 6px;
        }

        .pill {
            font-size: 9px;
            letter-spacing: 0.08em;
            padding: 4px 9px;
            border-radius: 999px;
            border: 1px solid rgba(0,0,0,0.15);
            cursor: pointer;
            color: #888;
            background: transparent;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .pill:hover {
            border-color: #212121;
            color: #212121;
        }

        .pill.active {
            background: #212121;
            color: #f8f8f8;
            border-color: #212121;
        }

        .back-btn {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: #999;
            text-decoration: none;
            position: relative;
        }

        .back-btn::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            width: 0;
            height: 1px;
            background: #212121;
            transition: width 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .back-btn:hover { color: #212121; }
        .back-btn:hover::after { width: 100%; }

        .style-btns {
            display: flex;
            gap: 6px;
        }

        .style-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid rgba(0,0,0,0.15);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #bbb;
            transition: color 0.3s ease, border-color 0.3s ease;
        }

        .style-btn:hover {
            border-color: #212121;
            color: #212121;
            animation: pulse-btn 1.2s ease-in-out infinite;
        }

        .style-btn.active {
            background: #212121;
            color: #f8f8f8;
            border-color: #212121;
            animation: none;
        }

        @keyframes pulse-btn {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.4; }
        }

        .glyphs-btn {
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            color: #f8f8f8;
            background: #212121;
            border: none;
            padding: 6px 14px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: opacity 0.2s;
        }

        .glyphs-btn::after {
            content: '';
            position: absolute;
            bottom: 4px;
            left: 14px;
            width: 0;
            height: 1px;
            background: #f8f8f8;
            transition: width 0.35s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .glyphs-btn:hover::after { width: calc(100% - 28px); }

        .glyphs-overlay {
            position: fixed;
            inset: 0;
            background: rgba(248,248,248,0.97);
            backdrop-filter: blur(12px);
            z-index: 1000;
            display: none;
            overflow-y: auto;
            padding: 100px 40px 80px;
        }

        .glyphs-overlay.open { display: block; animation: fadeIn 0.25s ease; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        .glyphs-close {
            position: fixed;
            top: 28px;
            right: 40px;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid rgba(0,0,0,0.12);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #999;
            transition: color 0.2s, border-color 0.2s;
        }

        .glyphs-close:hover { color: #212121; border-color: #212121; }

        .glyphs-section { margin-bottom: 48px; }

        .glyphs-label {
            font-size: 9px;
            letter-spacing: 0.25em;
            color: #bbb;
            margin-bottom: 16px;
        }

        .glyphs-grid {
            display: flex;
            flex-wrap: wrap;
            gap: 4px;
        }

        .glyph-cell {
            font-family: 'Dore', serif;
            font-size: 28px;
            width: 56px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: center;
            border: 1px solid rgba(0,0,0,0.07);
            border-radius: 8px;
            cursor: default;
            transition: border-color 0.2s, transform 0.2s;
            position: relative;
        }

        .glyph-cell:hover {
            border-color: rgba(0,0,0,0.2);
            z-index: 10;
        }

        .glyph-tooltip {
            position: fixed;
            pointer-events: none;
            background: #212121;
            color: #f8f8f8;
            border-radius: 12px;
            padding: 16px 20px;
            display: none;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            z-index: 200;
            transform: translate(-50%, -105%);
        }

        .glyph-tooltip.visible { display: flex; }

        .glyph-tooltip .big-char {
            font-family: 'Dore', serif;
            font-size: 56px;
            line-height: 1;
        }

        .glyph-tooltip .char-info {
            font-size: 9px;
            letter-spacing: 0.15em;
            color: rgba(255,255,255,0.4);
        }

        @media (max-width: 768px) {
            header { padding: 20px; }
            .glyphs-overlay { padding-top: 90px; }
            .canvas { padding: 40px 24px; }
            #preview-text { font-size: 48px; }
            footer {
                height: auto;
                flex-direction: column;
                padding: 0 0 24px 0;
            }
            .control {
                width: 100%;
                padding: 16px 24px;
                border-right: none;
                border-bottom: 1px solid rgba(0,0,0,0.07);
                gap: 12px;
                flex-wrap: wrap;
            }
            .weight-pills { flex-wrap: wrap; gap: 6px; }
            input[type="range"] { flex: 1; min-width: 120px; }
            .control:first-child { padding-left: 24px; }
        }
    </style>
</head>

    <header>
        <span class="header-meta" id="header-meta">REGULAR · 96px</span>
        <button class="glyphs-btn" onclick="toggleGlyphs()">GLYPHS</button>
    </header>

    <div class="glyphs-overlay" id="glyphs-overlay">
        <div class="glyphs-panel">
            <div class="glyphs-close" onclick="toggleGlyphs()">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            </div>
            <div class="glyphs-section">
                <div class="glyphs-label">UPPERCASE</div>
                <div class="glyphs-grid" id="grid-upper"></div>
            </div>
            <div class="glyphs-section">
                <div class="glyphs-label">NUMBERS</div>
                <div class="glyphs-grid" id="grid-numbers"></div>
            </div>
            <div class="glyphs-section">
                <div class="glyphs-label">SYMBOLS</div>
                <div class="glyphs-grid" id="grid-symbols"></div>
            </div>
            <div class="glyphs-section">
                <div class="glyphs-label">ACCENTED</div>
                <div class="glyphs-grid" id="grid-accented"></div>
            </div>

        </div>
        <div class="glyph-tooltip" id="glyph-tooltip"></div>
    </div>

    <div class="canvas" onclick="document.getElementById('preview-text').focus()">
        <textarea id="preview-text" oninput="autoResize(this)" rows="1">Dore</textarea>
    </div>

    <footer>
        <div class="control">
            <span class="ctrl-label">Weight</span>
            <div class="weight-pills">
                <button class="pill" onclick="setWeight(100, this)">THIN</button>
                <button class="pill" onclick="setWeight(300, this)">LIGHT</button>
                <button class="pill active" onclick="setWeight(400, this)">REGULAR</button>
                <button class="pill" onclick="setWeight(700, this)">BOLD</button>
                <button class="pill" onclick="setWeight(900, this)">BLACK</button>
            </div>
        </div>

        <div class="control">
            <span class="ctrl-label">Size</span>
            <input type="range" id="size-range" min="12" max="240" value="96" oninput="setSize(this.value)">
            <span class="ctrl-value" id="size-value">96px</span>
        </div>

        <div class="control">
            <span class="ctrl-label">Spacing</span>
            <input type="range" id="spacing-range" min="-5" max="30" value="0" step="0.5" oninput="setSpacing(this.value)">
            <span class="ctrl-value" id="spacing-value">0</span>
        </div>

        <div class="control">
            <span class="ctrl-label">Line Height</span>
            <input type="range" id="lineheight-range" min="0.8" max="3" value="1.05" step="0.05" oninput="setLineHeight(this.value)">
            <span class="ctrl-value" id="lineheight-value">1.05</span>
        </div>

        <div class="control">
            <span class="ctrl-label">Style</span>
            <div class="style-btns">
                <button class="style-btn" id="btn-underline" onclick="toggleStyle('underline')" title="Underline">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 4v6a6 6 0 0 0 12 0V4"/><line x1="4" y1="20" x2="20" y2="20"/></svg>
                </button>
                <button class="style-btn" id="btn-strikethrough" onclick="toggleStyle('strikethrough')" title="Strikethrough">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="4" y1="12" x2="20" y2="12"/><path d="M17.5 6.5C17.5 4 15.5 3 12 3s-6 1-6 4c0 2 1.5 3.5 6 4"/><path d="M6.5 17.5C6.5 20 8.5 21 12 21s6-1 6-4c0-1.5-.8-2.8-2.5-3.5"/></svg>
                </button>
            </div>
        </div>
    </footer>

    <script>
        let currentWeight = 400;
        let currentSize = 96;
        let activeStyles = { underline: false, strikethrough: false };

        function setWeight(w, el) {
            currentWeight = w;
            document.getElementById('preview-text').style.fontWeight = w;
            document.querySelectorAll('.pill').forEach(p => p.classList.remove('active'));
            el.classList.add('active');
            updateMeta();
        }

        function setSize(val) {
            currentSize = val;
            document.getElementById('preview-text').style.fontSize = val + 'px';
            document.getElementById('size-value').textContent = val + 'px';
            autoResize(document.getElementById('preview-text'));
            updateMeta();
        }

        function setSpacing(val) {
            document.getElementById('preview-text').style.letterSpacing = val + 'px';
            document.getElementById('spacing-value').textContent = val;
        }

        function setLineHeight(val) {
            document.getElementById('preview-text').style.lineHeight = val;
            document.getElementById('lineheight-value').textContent = val;
            autoResize(document.getElementById('preview-text'));
        }

        function toggleStyle(type) {
            activeStyles[type] = !activeStyles[type];
            document.getElementById('btn-' + type).classList.toggle('active', activeStyles[type]);
            const el = document.getElementById('preview-text');
            const u = activeStyles.underline;
            const s = activeStyles.strikethrough;
            el.style.textDecoration = u && s ? 'underline line-through' : u ? 'underline' : s ? 'line-through' : 'none';
        }

        function updateMeta() {
            const labels = {100:'THIN', 300:'LIGHT', 400:'REGULAR', 700:'BOLD', 900:'BLACK'};
            document.getElementById('header-meta').textContent = `${labels[currentWeight]} · ${currentSize}px`;
        }

        function autoResize(el) {
            el.style.height = 'auto';
            el.style.height = el.scrollHeight + 'px';
        }

        document.getElementById('preview-text').addEventListener('keydown', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                const pos = this.selectionStart;
                this.value = this.value.slice(0, pos) + '\n' + this.value.slice(pos);
                this.selectionStart = this.selectionEnd = pos + 1;
                autoResize(this);
            }
        });

        autoResize(document.getElementById('preview-text'));

        // Typewriter animation on load
        const el = document.getElementById('preview-text');
        const word = 'Dore';
        el.value = '';
        autoResize(el);

        let i = 0;
        function typeNext() {
            if (i < word.length) {
                el.value += word[i];
                i++;
                autoResize(el);
                setTimeout(typeNext, 120);
            }
        }
        setTimeout(typeNext, 400);

        // Glyphs map
        const glyphSets = {
            'grid-upper': 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split(''),
            'grid-numbers': '0123456789'.split(''),
            'grid-symbols': '.,!?;:\'"()-/&@#%+*=[]{}\\|<>~`^_€$£¥¢'.split(''),
            'grid-accented': 'ÀÁÂÃÄÅÆÇÈÉÊËÌÍÎÏÐÑÒÓÔÕÖØÙÚÛÜÝàáâãäåæçèéêëìíîïñòóôõöøùúûüýÿŁłŒœŠšŽžŸ'.split('')
        };

        const tooltip = document.getElementById('glyph-tooltip');

        Object.entries(glyphSets).forEach(([id, chars]) => {
            const grid = document.getElementById(id);
            chars.forEach(ch => {
                const cell = document.createElement('div');
                cell.className = 'glyph-cell';
                cell.textContent = ch;
                cell.addEventListener('mousemove', (e) => {
                    tooltip.classList.add('visible');
                    tooltip.style.left = e.clientX + 'px';
                    tooltip.style.top = e.clientY + 'px';
                    const bigChar = tooltip.querySelector('.big-char') || document.createElement('span');
                    const charInfo = tooltip.querySelector('.char-info') || document.createElement('span');
                    bigChar.className = 'big-char';
                    bigChar.textContent = ch;
                    charInfo.className = 'char-info';
                    charInfo.textContent = 'U+' + ch.charCodeAt(0).toString(16).toUpperCase().padStart(4,'0');
                    tooltip.textContent = '';
                    tooltip.appendChild(bigChar);
                    tooltip.appendChild(charInfo);
                });
                cell.addEventListener('mouseleave', () => {
                    tooltip.classList.remove('visible');
                });
                grid.appendChild(cell);
            });
        });

        function toggleGlyphs() {
            const overlay = document.getElementById('glyphs-overlay');
            overlay.classList.toggle('open');
            tooltip.classList.remove('visible');
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Escape') document.getElementById('glyphs-overlay').classList.remove('open');
        });

        // Mobile menu
        const trigger = document.getElementById('menu-trigger');
        const menu = document.getElementById('mobile-menu');
        const close = document.getElementById('menu-close');
        if (trigger) trigger.addEventListener('click', () => menu.classList.add('active'));
        if (close) close.addEventListener('click', () => menu.classList.remove('active'));
    </script>
    <script src="./cursor.js"></script>
</body>
