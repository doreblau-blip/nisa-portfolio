<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <style>
        :root {
            --box-w: 230px;
            --box-h: 306px;
            --box-d: 230px;
            --text-color: #000000;
            --bg-color: #ffffff;
            --accent-gray: #f2f2f2;
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            background-color: #ffffff !important;
            color: #000000 !important;
            font-family: 'Syne', sans-serif;
            display: flex;
            flex-direction: column;
        }

        * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

        /* --- DESKTOP LAYOUT (Unchanged) --- */
        @media (min-width: 769px) {
            .scene {
                flex: 1;
                position: relative;
                display: flex;
                align-items: center;
                justify-content: center;
                perspective: 2000px;
                cursor: grab;
                z-index: 1;
            }
            .scene:active { cursor: grabbing; }
            .cube-container {
                position: relative;
                width: var(--box-w);
                height: var(--box-h);
                transform-style: preserve-3d;
                pointer-events: none;
            }
            .cube {
                width: 100%;
                height: 100%;
                position: absolute;
                transform-style: preserve-3d;
                transform: rotateX(-20deg) rotateY(45deg);
            }
            .face-nav {
                position: absolute;
                right: 4vw;
                top: 50%;
                transform: translateY(-50%);
                display: flex;
                flex-direction: column;
                gap: 15px;
                z-index: 10;
            }
            .face-nav-item {
                font-size: 0.75rem;
                font-weight: 700;
                letter-spacing: 0.2em;
                text-transform: uppercase;
                color: #000;
                opacity: 0.4;
                cursor: pointer;
                transition: opacity 0.3s;
                text-align: right;
            }
            .face-nav-item.active, .face-nav-item:hover { opacity: 1; }
            .project-nav {
                position: absolute;
                top: 120px;
                left: 4vw;
                right: 4vw;
                display: flex;
                justify-content: space-between;
                align-items: center;
                z-index: 10;
            }
            .nav-link {
                font-size: 0.8rem;
                font-weight: 700;
                text-decoration: none;
                color: #000;
                display: flex;
                align-items: center;
                gap: 8px;
            }
            .controls-hint {
                position: absolute;
                bottom: 60px;
                left: 50%;
                transform: translateX(-50%);
                font-size: 0.7rem;
                text-transform: uppercase;
                letter-spacing: 0.2em;
                opacity: 0.3;
            }
            .footer { display: flex; }
        }

        /* --- CUBE FACES (Shared) --- */
        .cube-face {
            position: absolute;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(0,0,0,0.05);
            backface-visibility: visible;
        }
        .front  { width: var(--box-w); height: var(--box-h); transform: rotateY(0deg) translateZ(calc(var(--box-d) / 2)); }
        .back   { width: var(--box-w); height: var(--box-h); transform: rotateY(180deg) translateZ(calc(var(--box-d) / 2)); }
        .right  { width: var(--box-d); height: var(--box-h); transform: rotateY(90deg) translateZ(calc(var(--box-w) / 2)); left: calc((var(--box-w) - var(--box-d)) / 2); }
        .left   { width: var(--box-d); height: var(--box-h); transform: rotateY(-90deg) translateZ(calc(var(--box-w) / 2)); left: calc((var(--box-w) - var(--box-d)) / 2); }
        .top    { width: var(--box-w); height: var(--box-d); transform: rotateX(90deg) translateZ(calc(var(--box-h) / 2)); top: calc((var(--box-h) - var(--box-d)) / 2); }
        .bottom { width: var(--box-w); height: var(--box-d); transform: rotateX(-90deg) translateZ(calc(var(--box-h) / 2)); top: calc((var(--box-h) - var(--box-d)) / 2); }

        /* --- NEW MOBILE REDESIGN (9:16 Optimized) --- */
        @media (max-width: 768px) {
            :root {
                --box-w: 180px;
                --box-h: 240px;
                --box-d: 180px;
            }
            body { overflow: hidden; }
            .navbar { background: #fff !important; height: 80px; z-index: 100; position: relative; }
            .footer { display: none !important; }

            /* App-like structure */
            .mobile-visual-area {
                flex: 1;
                position: relative;
                display: flex;
                flex-direction: column;
                justify-content: center;
                align-items: center;
                background-color: #fff;
            }

            .mobile-control-center {
                background: #ffffff;
                padding-bottom: 40px;
                display: flex;
                flex-direction: column;
                gap: 25px;
                z-index: 20;
            }

            /* Cross-Project Nav in visual area top */
            .project-nav {
                width: 100%;
                padding: 0 6vw;
                position: absolute;
                top: 20px;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }
            .nav-link {
                font-size: 0.65rem;
                font-weight: 800;
                text-transform: uppercase;
                letter-spacing: 0.1em;
                color: #000;
                text-decoration: none;
                display: flex;
                align-items: center;
                gap: 4px;
                opacity: 0.6;
            }

            .scene {
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                perspective: 1200px;
            }

            .cube-container {
                position: relative;
                width: var(--box-w);
                height: var(--box-h);
                transform-style: preserve-3d;
                pointer-events: none;
            }
            .cube {
                width: 100%;
                height: 100%;
                position: absolute;
                transform-style: preserve-3d;
            }

            /* Minimal Text-Only Controllers */
            .face-nav {
                display: grid;
                grid-template-columns: repeat(3, 1fr);
                gap: 20px 0;
                width: 100%;
                padding: 0 4vw;
            }
            .face-nav-item {
                font-size: 0.65rem;
                font-weight: 700;
                letter-spacing: 0.15em;
                text-align: center;
                color: #000;
                opacity: 0.3;
                text-decoration: underline;
                text-underline-offset: 6px;
                transition: opacity 0.3s;
            }
            .face-nav-item.active { opacity: 1; font-weight: 800; }

            .controls-hint { display: none; }
        }
    </style>
</head>
<body>

            <span class="nav-subtitle">Art Director & Designer</span>
        </div>
        <div class="nav-right">

            </div>
            <button class="mobile-menu-trigger" id="menu-trigger" aria-label="Menu">

        <nav class="mobile-nav-links">

    <!-- MAIN INTERFACE -->
    <div class="mobile-visual-area">
        <div class="project-nav">
            <a href="./project-9.html" class="nav-link">

                <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">

        <div class="scene" id="scene">
            <div class="cube-container">

                    <div class="cube-face front" style="background-image: url('images/dobi/3d/front.png');"></div>
                    <div class="cube-face back" style="background-image: url('images/dobi/3d/back.png');"></div>
                    <div class="cube-face right" style="background-image: url('images/dobi/3d/right.png');"></div>
                    <div class="cube-face left" style="background-image: url('images/dobi/3d/left.png');"></div>
                    <div class="cube-face top" style="background-image: url('images/dobi/3d/top.png');"></div>

        <div class="face-nav">
            <div class="face-nav-item active" data-face="front">FRONT</div>
            <div class="face-nav-item" data-face="back">BACK</div>
            <div class="face-nav-item" data-face="top">TOP</div>
            <div class="face-nav-item" data-face="bottom">BOTTOM</div>

    <script src="./cursor.js"></script>
    <script>
        const cube = document.getElementById('cube');
        const scene = document.getElementById('scene');
        let isDragging = false;
        let startX, startY;
        let rotX = -20, rotY = 45;
        let targetRotX = -20, targetRotY = 45;
        let velocityX = 0, velocityY = 0;
        let autoRotate = true;

        const startMove = (x, y) => { isDragging = true; startX = x; startY = y; autoRotate = false; };
        const onMove = (x, y) => {
            if (!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            targetRotY += dx * 0.4;
            targetRotX -= dy * 0.4;
            velocityX = dx * 0.2;
            velocityY = dy * 0.2;
            startX = x;
            startY = y;
        };

        scene.addEventListener('mousedown', e => startMove(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);
        scene.addEventListener('touchstart', e => startMove(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', () => isDragging = false);

        const faceButtons = document.querySelectorAll('.face-nav-item');
        const faceRotations = {
            'front': { x: 0, y: 0 }, 'back': { x: 0, y: 180 },
            'top': { x: -90, y: 0 }, 'bottom': { x: 90, y: 0 },
            'left': { x: 0, y: 90 }, 'right': { x: 0, y: -90 }
        };

        faceButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const face = btn.dataset.face;
                if (faceRotations[face]) {
                    autoRotate = false;
                    const rot = faceRotations[face];
                    targetRotX = rot.x;
                    let diffY = rot.y - (targetRotY % 360);
                    if (diffY > 180) diffY -= 360;
                    if (diffY < -180) diffY += 360;
                    targetRotY += diffY;
                    document.querySelectorAll(`.face-nav-item[data-face="${face}"]`).forEach(b => b.classList.add('active'));
                    document.querySelectorAll(`.face-nav-item:not([data-face="${face}"])`).forEach(b => b.classList.remove('active'));
                }
            });
        });

        function animate() {
            if (!isDragging) {
                if (autoRotate) targetRotY += 0.1;
                else {
                    targetRotY += velocityX; targetRotX -= velocityY;
                    velocityX *= 0.95; velocityY *= 0.95;
                    if (Math.abs(velocityX) < 0.01 && Math.abs(velocityY) < 0.01) autoRotate = true;
                }
            }
            rotX += (targetRotX - rotX) * 0.1;
            rotY += (targetRotY - rotY) * 0.1;
            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            requestAnimationFrame(animate);
        }
        animate();

        const trigger = document.getElementById('menu-trigger');
        const menu = document.getElementById('mobile-menu');
        const close = document.getElementById('menu-close');
        if(trigger && menu) trigger.onclick = () => menu.classList.add('active');
        if(close) close.onclick = () => menu.classList.remove('active');
    </script>
