<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Box Showcase | Lootie | Nisa Alkan</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="./css/style.css?v=1773367650">
    <style>
        :root {
            --box-w: 230px;
            --box-h: 306px;
            --box-d: 230px;
            --text-color: #000000;
            --bg-color: #ffffff;
        }

        @media (max-width: 768px) {
            :root {
                --box-w: 160px;
                --box-h: 213px;
                --box-d: 160px;
            }
        }

        body {
            margin: 0;
            padding: 0;
            overflow: hidden;
            height: 100vh;
            width: 100vw;
            display: flex;
            flex-direction: column;
            background-color: #ffffff !important;
            color: #000000 !important;
            font-family: 'Syne', sans-serif;
        }

        /* Enforce theme */
        * {
            -webkit-tap-highlight-color: transparent;
        }

        .scene {
            flex: 1;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 2000px;
            cursor: grab;
            background: radial-gradient(circle at center, rgba(0, 0, 0, 0.02) 0%, transparent 70%);
            z-index: 1;
        }

        .scene:active {
            cursor: grabbing;
        }

        .cube-container {
            position: relative;
            width: var(--box-w);
            height: var(--box-h);
            transform-style: preserve-3d;
            pointer-events: none;
        }

        .cube {
            width: 100%;
            height: 100%;
            position: absolute;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(45deg);
        }

        .cube-face {
            position: absolute;
            background-size: cover;
            background-position: center;
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
            box-sizing: border-box;
        }

        /* Rectangular 3D Logic */
        .front  { width: var(--box-w); height: var(--box-h); transform: rotateY(0deg) translateZ(calc(var(--box-d) / 2)); }
        .back   { width: var(--box-w); height: var(--box-h); transform: rotateY(180deg) translateZ(calc(var(--box-d) / 2)); }
        .right  { width: var(--box-d); height: var(--box-h); transform: rotateY(90deg) translateZ(calc(var(--box-w) / 2)); left: calc((var(--box-w) - var(--box-d)) / 2); }
        .left   { width: var(--box-d); height: var(--box-h); transform: rotateY(-90deg) translateZ(calc(var(--box-w) / 2)); left: calc((var(--box-w) - var(--box-d)) / 2); }
        .top    { width: var(--box-w); height: var(--box-d); transform: rotateX(90deg) translateZ(calc(var(--box-h) / 2)); top: calc((var(--box-h) - var(--box-d)) / 2); }
        .bottom { width: var(--box-w); height: var(--box-d); transform: rotateX(-90deg) translateZ(calc(var(--box-h) / 2)); top: calc((var(--box-h) - var(--box-d)) / 2); }

        /* Effects */
        .shimmer {
            position: absolute;
            inset: 0;
            background: linear-gradient(115deg, transparent, rgba(255,255,255,0.2), transparent);
            background-size: 200% 100%;
            opacity: 0;
            z-index: 2;
            pointer-events: none;
        }
        .paper-texture {
            position: absolute;
            inset: 0;
            background-image: url("https://www.transparenttextures.com/patterns/natural-paper.png");
            opacity: 0.1;
            z-index: 1;
            pointer-events: none;
        }

        /* Nav & UI */
        .face-nav {
            position: absolute;
            right: 4vw;
            top: 50%;
            transform: translateY(-50%);
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
        }

        .face-nav-item {
            font-size: 0.75rem;
            font-weight: 700;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: #000;
            opacity: 0.4;
            cursor: pointer;
            padding: 10px 0;
            text-align: right;
            transition: opacity 0.3s;
        }
        .face-nav-item:hover, .face-nav-item.active {
            opacity: 1;
        }

        .controls-hint {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.3;
            z-index: 5;
        }

        .back-to-project {
            position: absolute;
            top: 120px;
            left: 4vw;
            font-size: 0.8rem;
            font-weight: 700;
            text-decoration: none;
            color: #000;
            z-index: 10;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .next-showcase {
            position: absolute;
            bottom: 40px;
            right: 4vw;
            font-size: 0.75rem;
            font-weight: 700;
            text-decoration: none;
            color: #000;
            opacity: 0.5;
            z-index: 10;
        }

        /* Mobile Adjustments */
        @media (max-width: 768px) {
            .navbar, .footer {
                background-color: #ffffff !important;
            }
            .scene {
                padding-top: 0;
            }
            .face-nav {
                right: 0;
                left: 0;
                top: auto;
                bottom: 160px;
                transform: none;
                flex-direction: row;
                justify-content: center;
                gap: 15px;
                width: 100%;
            }
            .face-nav-item {
                font-size: 0.65rem;
                padding: 10px 5px;
                background: rgba(0,0,0,0.03);
                border-radius: 20px;
                padding: 6px 12px;
            }
            .controls-hint {
                bottom: 110px;
                width: 100%;
                text-align: center;
            }
            .back-to-project {
                top: 100px;
                width: 100%;
                justify-content: center;
                left: 0;
            }
            .next-showcase {
                bottom: 40px;
                left: 0;
                right: 0;
                text-align: center;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html"><h1 class="nav-name">Nisa Alkan</h1></a>
            <span class="nav-subtitle">Art Director & Designer</span>
        </div>
        <div class="nav-right">
            <div class="nav-links">
                <a href="dobi-3d.html">3D SHOWCASE</a>
                <a href="about.html">ABOUT</a>
                <a href="contact.html">CONTACT</a>
            </div>
            <button class="mobile-menu-trigger" id="menu-trigger">MENU</button>
        </div>
    </nav>

    <a href="./project-2.html" class="back-to-project">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" transform="rotate(180)">
            <line x1="7" y1="17" x2="17" y2="7"></line>
            <polyline points="7 7 17 7 17 17"></polyline>
        </svg>
        Back to Lootie
    </a>

    <div class="scene" id="scene">
        <div class="face-nav">
            <div class="face-nav-item active" data-face="front">FRONT</div>
            <div class="face-nav-item" data-face="back">BACK</div>
            <div class="face-nav-item" data-face="top">TOP</div>
            <div class="face-nav-item" data-face="bottom">BOTTOM</div>
            <div class="face-nav-item" data-face="left">LEFT</div>
            <div class="face-nav-item" data-face="right">RIGHT</div>
        </div>
        <div class="cube-container">
            <div class="cube" id="cube">
                <div class="cube-face front" style="background-image: url('images/lootie/3d/front.svg');"></div>
                <div class="cube-face back" style="background-image: url('images/lootie/3d/back.svg');"></div>
                <div class="cube-face right" style="background-image: url('images/lootie/3d/right.png');"></div>
                <div class="cube-face left" style="background-image: url('images/lootie/3d/left.png');"></div>
                <div class="cube-face top" style="background-image: url('images/lootie/3d/top.png');"></div>
                <div class="cube-face bottom" style="background-image: url('images/lootie/3d/bottom.png');"></div>
            </div>
        </div>
    </div>

    <div class="controls-hint">Drag to rotate the box</div>
    <a href="dobi-3d.html" class="next-showcase">DOBI — NEXT</a>

    <div class="mobile-overlay" id="mobile-menu">
        <button class="mobile-overlay-close" id="menu-close">CLOSE</button>
        <nav class="mobile-nav-links">
            <a href="index.html">WORK</a>
            <a href="dobi-3d.html">3D SHOWCASE</a>
            <a href="about.html">ABOUT</a>
            <a href="contact.html">CONTACT</a>
        </nav>
    </div>

    <footer class="footer">
        <div class="footer-left">&copy; 2026 NISA ALKAN</div>
        <div class="footer-right">hello@doreblau.com</div>
    </footer>

    <script src="./cursor.js"></script>
    <script>
        const cube = document.getElementById('cube');
        const scene = document.getElementById('scene');
        let isDragging = false;
        let startX, startY;
        let rotX = -20, rotY = 45;
        let targetRotX = -20, targetRotY = 45;
        let velocityX = 0, velocityY = 0;
        let autoRotate = true;

        // Interaction
        const startMove = (x, y) => {
            isDragging = true;
            startX = x;
            startY = y;
            autoRotate = false;
        };

        const onMove = (x, y) => {
            if (!isDragging) return;
            const dx = x - startX;
            const dy = y - startY;
            targetRotY += dx * 0.4;
            targetRotX -= dy * 0.4;
            velocityX = dx * 0.2;
            velocityY = dy * 0.2;
            startX = x;
            startY = y;
        };

        scene.addEventListener('mousedown', e => startMove(e.clientX, e.clientY));
        window.addEventListener('mousemove', e => onMove(e.clientX, e.clientY));
        window.addEventListener('mouseup', () => isDragging = false);

        scene.addEventListener('touchstart', e => startMove(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchmove', e => onMove(e.touches[0].clientX, e.touches[0].clientY));
        window.addEventListener('touchend', () => isDragging = false);

        // Navigation
        const faceButtons = document.querySelectorAll('.face-nav-item');
        const faceRotations = {
            'front': { x: 0, y: 0 }, 'back': { x: 0, y: 180 },
            'top': { x: -90, y: 0 }, 'bottom': { x: 90, y: 0 },
            'left': { x: 0, y: 90 }, 'right': { x: 0, y: -90 }
        };

        faceButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                const face = btn.dataset.face;
                if (faceRotations[face]) {
                    autoRotate = false;
                    const rot = faceRotations[face];
                    targetRotX = rot.x;
                    // Find closest Y path
                    let diffY = rot.y - (targetRotY % 360);
                    if (diffY > 180) diffY -= 360;
                    if (diffY < -180) diffY += 360;
                    targetRotY += diffY;
                    faceButtons.forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                }
            });
        });

        function animate() {
            if (!isDragging) {
                if (autoRotate) {
                    targetRotY += 0.1;
                } else {
                    targetRotY += velocityX;
                    targetRotX -= velocityY;
                    velocityX *= 0.95;
                    velocityY *= 0.95;
                    if (Math.abs(velocityX) < 0.01 && Math.abs(velocityY) < 0.01) autoRotate = true;
                }
            }
            
            rotX += (targetRotX - rotX) * 0.1;
            rotY += (targetRotY - rotY) * 0.1;

            cube.style.transform = `rotateX(${rotX}deg) rotateY(${rotY}deg)`;
            requestAnimationFrame(animate);
        }
        animate();

        // Menu
        const trigger = document.getElementById('menu-trigger');
        const menu = document.getElementById('mobile-menu');
        const close = document.getElementById('menu-close');
        if(trigger && menu) trigger.onclick = () => menu.classList.add('active');
        if(close) close.onclick = () => menu.classList.remove('active');
    </script>
</body>
</html>
