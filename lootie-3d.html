<!DOCTYPE html>

<head>

    <link rel="stylesheet" href="./css/style.css?v=1773366913">
    <style>
        :root {
            --box-w: 260px;
            --box-h: 346px; /* Matching the 1.33 aspect ratio of the visuals (1880/1412) */
            --box-d: 260px;
        }

        @media (max-width: 768px) {
            :root {
                --box-w: 180px;
                --box-h: 240px;
                --box-d: 180px;
            }
        }

        body {
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .scene {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            perspective: 1500px;
            cursor: grab;
            background: radial-gradient(circle at center, rgba(128, 128, 128, 0.05) 0%, transparent 70%);
        }

        .scene:active {
            cursor: grabbing;
        }

        .cube {
            width: var(--box-w);
            height: var(--box-h);
            position: relative;
            transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(45deg);
        }

        .cube-face {
            position: absolute;
            background-size: cover;
            background-position: center;
            box-shadow: inset 0 0 50px rgba(0,0,0,0.1);
            border: 1px solid rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            backface-visibility: visible;
        }

        /* Rectangular 3D Logic */
        .front  { width: var(--box-w); height: var(--box-h); transform: rotateY(0deg) translateZ(calc(var(--box-d) / 2)); }
        .back   { width: var(--box-w); height: var(--box-h); transform: rotateY(180deg) translateZ(calc(var(--box-d) / 2)); }
        .right  { width: var(--box-d); height: var(--box-h); transform: rotateY(90deg) translateZ(calc(var(--box-w) / 2)); left: calc((var(--box-w) - var(--box-d)) / 2); }
        .left   { width: var(--box-d); height: var(--box-h); transform: rotateY(-90deg) translateZ(calc(var(--box-w) / 2)); left: calc((var(--box-w) - var(--box-d)) / 2); }
        .top    { width: var(--box-w); height: var(--box-d); transform: rotateX(90deg) translateZ(calc(var(--box-h) / 2)); top: calc((var(--box-h) - var(--box-d)) / 2); }
        .bottom { width: var(--box-w); height: var(--box-d); transform: rotateX(-90deg) translateZ(calc(var(--box-h) / 2)); top: calc((var(--box-h) - var(--box-d)) / 2); }

        .controls-hint {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            font-family: var(--font-family);
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
            opacity: 0.4;
            pointer-events: none;
        }

        .back-to-project {
            position: absolute;
            top: 120px;
            left: 4vw;
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-color);
            font-family: var(--font-family);
            font-size: 0.9rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            transition: var(--transition);
        }

        .back-to-project:hover {
            transform: translateX(-5px);
            opacity: 0.7;
        }

        .back-to-project svg {
            transform: rotate(180deg);
        }

        body.dark-mode .cube-face {
            border-color: rgba(255,255,255,0.05);
            box-shadow: inset 0 0 50px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

    <div class="scene" id="scene">
        <div class="cube" id="cube">
            <!-- Textures from desktop assets -->

            <div class="cube-face back" style="background-image: url('images/lootie/3d/back.svg');"></div>

            <div class="cube-face left" style="background-image: url('images/lootie/3d/left.png');"></div>
            <div class="cube-face top" style="background-image: url('images/lootie/3d/top.png');"></div>

    <script src="./cursor.js?v=1773365975"></script>
    <script>
        const cube = document.getElementById('cube');
        const scene = document.getElementById('scene');
        let isDragging = false;
        let startX, startY;
        
        // Target rotation
        let targetRotX = -20;
        let targetRotY = 45;
        
        // Current rotation (for smooth lerping)
        let currentRotX = -20;
        let currentRotY = 45;
        
        let velocityX = 0;
        let velocityY = 0;

        scene.addEventListener('mousedown', (e) => {
            isDragging = true;
            startX = e.clientX;
            startY = e.clientY;
            autoRotate = false;
        });

        window.addEventListener('mousemove', (e) => {
            if (!isDragging) return;
            const deltaX = e.clientX - startX;
            const deltaY = e.clientY - startY;

            targetRotY += deltaX * 0.4;
            targetRotX -= deltaY * 0.4;
            
            velocityX = deltaX * 0.4;
            velocityY = deltaY * 0.4;

            startX = e.clientX;
            startY = e.clientY;
        });

        window.addEventListener('mouseup', () => {
            isDragging = false;
            // Re-enable autoRotate after a delay if desired, or let inertia handle it
        });

        // Touch support
        scene.addEventListener('touchstart', (e) => {
            isDragging = true;
            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
            autoRotate = false;
        });

        window.addEventListener('touchmove', (e) => {
            if (!isDragging) return;
            const deltaX = e.touches[0].clientX - startX;
            const deltaY = e.touches[0].clientY - startY;

            targetRotY += deltaX * 0.4;
            targetRotX -= deltaY * 0.4;
            
            velocityX = deltaX * 0.4;
            velocityY = deltaY * 0.4;

            startX = e.touches[0].clientX;
            startY = e.touches[0].clientY;
        });

        window.addEventListener('touchend', () => {
            isDragging = false;
        });

        // Auto-rotation & Inertia Engine
        let autoRotate = true;
        function animate() {
            if (isDragging) {
                // Direct follow while dragging but with small lerp
                currentRotX += (targetRotX - currentRotX) * 0.15;
                currentRotY += (targetRotY - currentRotY) * 0.15;
            } else {
                if (autoRotate) {
                    targetRotY += 0.2;
                } else {
                    // Inertia damping
                    targetRotY += velocityX;
                    targetRotX -= velocityY;
                    velocityX *= 0.95;
                    velocityY *= 0.95;
                }
                
                // Pürüzsüz geçiş (Lerp)
                currentRotX += (targetRotX - currentRotX) * 0.08;
                currentRotY += (targetRotY - currentRotY) * 0.08;
            }

            cube.style.transform = `rotateX(${currentRotX}deg) rotateY(${currentRotY}deg)`;
            requestAnimationFrame(animate);
        }
        animate();

        // Interaction logic
        scene.addEventListener('mouseenter', () => autoRotate = false);
        scene.addEventListener('mouseleave', () => {
            if (!isDragging) autoRotate = true;
        });
    </script>
</body>
