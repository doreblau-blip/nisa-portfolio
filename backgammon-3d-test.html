<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Backgammon Notebook — 3D Test</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #f8f8f8;
            font-family: 'Syne', sans-serif;
            overflow: hidden;
        }

        .label {
            font-size: 10px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: rgba(0,0,0,0.28);
            margin-bottom: 36px;
        }

        .spread {
            position: relative;
            width: 708px;
            height: 500px;
            border-radius: 4px;
            overflow: hidden;
            box-shadow:
                0 2px 6px rgba(0,0,0,0.07),
                0 10px 28px rgba(0,0,0,0.12),
                0 28px 60px rgba(0,0,0,0.09);
            transition: transform 0.35s cubic-bezier(0.4,0,0.2,1), box-shadow 0.35s ease;
        }
        .spread.closing {
            transform: scale(0.93);
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }

        .spread img {
            position: absolute;
            inset: 0;
            width: 100%; height: 100%;
            object-fit: cover;
            display: block;
            transform: scale(1.08);
            transition: opacity 0.2s ease;
        }

        .spread img.hidden { opacity: 0; }

        /* Realistic fold/crease */
        .fold-line {
            position: absolute;
            left: calc(50% - 4px);
            top: 0;
            width: 8px;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            background: linear-gradient(to right,
                transparent 0%,
                rgba(0,0,0,0.06) 35%,
                rgba(0,0,0,0.14) 50%,
                rgba(0,0,0,0.06) 65%,
                transparent 100%
            );
        }

        .controls {
            margin-top: 40px;
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 22px;
            font-size: 10px;
            letter-spacing: 0.18em;
            text-transform: uppercase;
            background: transparent;
            border: 1px solid rgba(0,0,0,0.22);
            color: #212121;
            cursor: pointer;
            font-family: 'Syne', sans-serif;
            transition: background 0.2s, color 0.2s, border-color 0.2s;
        }
        .btn:hover { background: #212121; color: #f8f8f8; border-color: #212121; }
        .btn.active { background: #212121; color: #f8f8f8; border-color: #212121; }
    </style>
</head>
<body>

    <div class="label">Backgammon Notebook</div>

    <div class="spread">
        <img id="imgExterior" src="backgammon-3d/open.png" alt="Exterior">
        <img id="imgInterior" src="backgammon-3d/interior.png" alt="Interior" class="hidden">
        <div class="fold-line"></div>
    </div>

    <div class="controls">
        <button class="btn active" id="btnExterior">Exterior</button>
        <button class="btn" id="btnInterior">Interior</button>
        <div style="width:1px;height:20px;background:rgba(0,0,0,0.15);margin:0 4px;"></div>
        <a href="backgammon-book.html" class="btn" style="text-decoration:none;">Deneme →</a>
    </div>

    <script>
        const spreadEl   = document.querySelector('.spread');
        const imgExterior = document.getElementById('imgExterior');
        const imgInterior = document.getElementById('imgInterior');
        const btnExterior = document.getElementById('btnExterior');
        const btnInterior = document.getElementById('btnInterior');
        let switching = false;

        function switchTo(showEl, hideEl, activeBtn, inactiveBtn) {
            if (switching) return;
            switching = true;

            // Phase 1: close (scale down + fade out current)
            spreadEl.classList.add('closing');
            hideEl.style.opacity = '0';

            setTimeout(() => {
                // Phase 2: swap image
                hideEl.classList.add('hidden');
                showEl.classList.remove('hidden');
                showEl.style.opacity = '0';

                // tiny frame to let hidden class apply before fading in
                requestAnimationFrame(() => {
                    requestAnimationFrame(() => {
                        // Phase 3: open (scale up + fade in new)
                        spreadEl.classList.remove('closing');
                        showEl.style.opacity = '';
                        activeBtn.classList.add('active');
                        inactiveBtn.classList.remove('active');
                        setTimeout(() => {
                            hideEl.style.opacity = '';
                            switching = false;
                        }, 380);
                    });
                });
            }, 360);
        }

        btnExterior.addEventListener('click', () => {
            switchTo(imgExterior, imgInterior, btnExterior, btnInterior);
        });
        btnInterior.addEventListener('click', () => {
            switchTo(imgInterior, imgExterior, btnInterior, btnExterior);
        });
    </script>

</body>
</html>
